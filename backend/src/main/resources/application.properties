quarkus.datasource.db-kind=postgresql

# Scoped to dev/prod only: leaving %test unconfigured makes Quarkus Dev
# Services spin up an isolated, ephemeral Postgres (via Testcontainers)
# for test runs instead of reusing the dev database.
%dev,prod.quarkus.datasource.username=${DB_USER:coach_buddy}
%dev,prod.quarkus.datasource.password=${DB_PASSWORD:coach_buddy}
%dev,prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coach_buddy}

quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.database.default-schema=coach_buddy

quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=coach_buddy
quarkus.flyway.default-schema=coach_buddy

quarkus.smallrye-openapi.info-title=Coach Buddy API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API für Trainings-, Team- und Personenverwaltung


quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:4200
%dev.quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://coach-buddy.moehring.de/issuer
smallrye.jwt.sign.key.location=privateKey.pem

quarkus.http.auth.permission.public.paths=/api/v1/auth/*,/q/openapi,/q/swagger-ui/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/api/v1/*
quarkus.http.auth.permission.authenticated.policy=authenticated
