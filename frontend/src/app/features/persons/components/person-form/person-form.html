<p-card styleClass="person-form-card">
  <ng-template pTemplate="title">
    {{ title }}
  </ng-template>

  <ng-template pTemplate="subtitle">
    {{ subtitle }}
  </ng-template>

  <form class="person-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="name-grid">
      <label class="form-field">
        <span>Vorname</span>
        <input
          pInputText
          type="text"
          formControlName="firstName"
          placeholder="z. B. Max"
        />

        @if (isInvalid('firstName')) {
          <small class="field-error">Vorname ist erforderlich.</small>
        }
      </label>

      <label class="form-field">
        <span>Nachname</span>
        <input
          pInputText
          type="text"
          formControlName="lastName"
          placeholder="z. B. Müller"
        />

        @if (isInvalid('lastName')) {
          <small class="field-error">Nachname ist erforderlich.</small>
        }
      </label>
    </div>

    <div class="details-grid">
      <label class="form-field">
        <span>Geburtsdatum</span>
        <p-datepicker
          formControlName="birthDate"
          dateFormat="dd.mm.yy"
          appendTo="body"
        />
      </label>

      <label class="form-field">
        <span>Spitzname</span>
        <input
          pInputText
          type="text"
          formControlName="nickname"
          placeholder="Optional"
        />
      </label>
    </div>

    <label class="form-field">
      <span>Notiz</span>
      <textarea
        rows="5"
        formControlName="notes"
        placeholder="Optionale Notiz zur Person"
      ></textarea>
    </label>

    <div class="form-actions">
      <button
        pButton
        type="button"
        severity="secondary"
        [outlined]="true"
        [routerLink]="cancelLink"
        [disabled]="saving"
      >
        Abbrechen
      </button>

      <button pButton type="submit" [disabled]="saving">
        <i class="pi pi-check"></i>
        <span>{{ saving ? 'Speichert ...' : submitLabel }}</span>
      </button>
    </div>
  </form>
</p-card>
